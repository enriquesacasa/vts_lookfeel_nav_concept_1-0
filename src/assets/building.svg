<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8c8e8"/>
      <stop offset="100%" stop-color="#d8e4f0"/>
    </linearGradient>
    <linearGradient id="tower-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b7fa0"/>
      <stop offset="40%" stop-color="#8fa3c0"/>
      <stop offset="100%" stop-color="#7890b0"/>
    </linearGradient>
    <linearGradient id="tower-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a5f7a"/>
      <stop offset="100%" stop-color="#3d5068"/>
    </linearGradient>
    <linearGradient id="glass-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d8f0" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a0b8d8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8090b0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="160" height="200" fill="url(#sky)"/>

  <!-- Background buildings (shorter) -->
  <rect x="0" y="100" width="30" height="100" fill="#8090a8" opacity="0.5"/>
  <rect x="0" y="100" width="30" height="100" fill="none" stroke="#6878900" stroke-width="0.3" opacity="0.3"/>
  <rect x="125" y="110" width="35" height="90" fill="#7888a0" opacity="0.5"/>

  <!-- Mid building left -->
  <rect x="5" y="80" width="22" height="120" fill="#7080a0" opacity="0.7"/>
  <!-- Windows mid left -->
  <rect x="8" y="85" width="4" height="3" fill="#b8d0e8" opacity="0.6"/>
  <rect x="14" y="85" width="4" height="3" fill="#b8d0e8" opacity="0.6"/>
  <rect x="20" y="85" width="4" height="3" fill="#b8d0e8" opacity="0.6"/>
  <rect x="8" y="91" width="4" height="3" fill="#c8d8ee" opacity="0.8"/>
  <rect x="14" y="91" width="4" height="3" fill="#90aac8" opacity="0.4"/>
  <rect x="20" y="91" width="4" height="3" fill="#c8d8ee" opacity="0.8"/>

  <!-- Main tower — front face -->
  <rect x="38" y="20" width="70" height="180" fill="url(#tower-face)"/>

  <!-- Main tower — side face (right) -->
  <polygon points="108,20 130,35 130,200 108,200" fill="url(#tower-side)"/>

  <!-- Glass curtain-wall grid — front -->
  <!-- Horizontal bands every 8px -->
  <line x1="38" y1="28" x2="108" y2="28" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="36" x2="108" y2="36" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="44" x2="108" y2="44" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="52" x2="108" y2="52" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="60" x2="108" y2="60" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="68" x2="108" y2="68" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="76" x2="108" y2="76" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="84" x2="108" y2="84" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="92" x2="108" y2="92" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="100" x2="108" y2="100" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="108" x2="108" y2="108" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="116" x2="108" y2="116" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="124" x2="108" y2="124" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="132" x2="108" y2="132" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="140" x2="108" y2="140" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="148" x2="108" y2="148" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="156" x2="108" y2="156" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="164" x2="108" y2="164" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>
  <line x1="38" y1="172" x2="108" y2="172" stroke="#9ab0c8" stroke-width="0.4" opacity="0.5"/>

  <!-- Vertical mullions every ~14px -->
  <line x1="52" y1="20" x2="52" y2="200" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>
  <line x1="66" y1="20" x2="66" y2="200" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>
  <line x1="80" y1="20" x2="80" y2="200" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>
  <line x1="94" y1="20" x2="94" y2="200" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>

  <!-- Glass window panes — lit floors -->
  <rect x="40" y="29" width="10" height="6" fill="#c8e0f4" opacity="0.7"/>
  <rect x="54" y="29" width="10" height="6" fill="#d8e8f8" opacity="0.8"/>
  <rect x="68" y="29" width="10" height="6" fill="#c0d8f0" opacity="0.6"/>
  <rect x="82" y="29" width="10" height="6" fill="#d0e0f4" opacity="0.75"/>
  <rect x="96" y="29" width="10" height="6" fill="#c8e0f4" opacity="0.7"/>

  <rect x="40" y="37" width="10" height="6" fill="#b8d4ec" opacity="0.5"/>
  <rect x="54" y="37" width="10" height="6" fill="#d4e6f6" opacity="0.75"/>
  <rect x="68" y="37" width="10" height="6" fill="#e0ecfa" opacity="0.85"/>
  <rect x="82" y="37" width="10" height="6" fill="#c0d8f0" opacity="0.6"/>
  <rect x="96" y="37" width="10" height="6" fill="#d8e8f8" opacity="0.8"/>

  <rect x="40" y="45" width="10" height="6" fill="#d0e4f6" opacity="0.75"/>
  <rect x="54" y="45" width="10" height="6" fill="#b0ccec" opacity="0.5"/>
  <rect x="68" y="45" width="10" height="6" fill="#c8def4" opacity="0.7"/>
  <rect x="82" y="45" width="10" height="6" fill="#dceaf8" opacity="0.82"/>
  <rect x="96" y="45" width="10" height="6" fill="#b8d2ec" opacity="0.55"/>

  <!-- Repeat window pattern for several more floors -->
  <rect x="40" y="53" width="10" height="6" fill="#c4dcf2" opacity="0.65"/>
  <rect x="54" y="53" width="10" height="6" fill="#d8e8f8" opacity="0.78"/>
  <rect x="68" y="53" width="10" height="6" fill="#b0ccea" opacity="0.5"/>
  <rect x="82" y="53" width="10" height="6" fill="#cce2f6" opacity="0.72"/>
  <rect x="96" y="53" width="10" height="6" fill="#e0ecfa" opacity="0.85"/>

  <rect x="40" y="61" width="10" height="6" fill="#daeaf8" opacity="0.82"/>
  <rect x="54" y="61" width="10" height="6" fill="#c0d6f0" opacity="0.62"/>
  <rect x="68" y="61" width="10" height="6" fill="#d4e4f6" opacity="0.76"/>
  <rect x="82" y="61" width="10" height="6" fill="#b8d0ec" opacity="0.55"/>
  <rect x="96" y="61" width="10" height="6" fill="#c8def4" opacity="0.7"/>

  <!-- Glass sheen overlay -->
  <rect x="38" y="20" width="70" height="180" fill="url(#glass-sheen)"/>

  <!-- Side face windows -->
  <rect x="112" y="38" width="8" height="5" fill="#7090b0" opacity="0.5"/>
  <rect x="122" y="40" width="5" height="5" fill="#6080a0" opacity="0.4"/>
  <rect x="112" y="46" width="8" height="5" fill="#80a0c0" opacity="0.55"/>
  <rect x="122" y="48" width="5" height="5" fill="#7090b0" opacity="0.45"/>
  <rect x="112" y="54" width="8" height="5" fill="#6888a8" opacity="0.45"/>
  <rect x="122" y="56" width="5" height="5" fill="#7898b8" opacity="0.5"/>

  <!-- Tower crown / top setback -->
  <rect x="52" y="8" width="42" height="14" fill="#7888a8"/>
  <polygon points="94,8 110,20 108,20 94,8" fill="#5a6880"/>
  <line x1="52" y1="12" x2="94" y2="12" stroke="#9ab0c8" stroke-width="0.5" opacity="0.5"/>
  <line x1="52" y1="16" x2="94" y2="16" stroke="#9ab0c8" stroke-width="0.5" opacity="0.5"/>
  <line x1="66" y1="8" x2="66" y2="20" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>
  <line x1="80" y1="8" x2="80" y2="20" stroke="#9ab0c8" stroke-width="0.4" opacity="0.4"/>

  <!-- Antenna -->
  <line x1="73" y1="0" x2="73" y2="8" stroke="#8898b0" stroke-width="1.5"/>
  <line x1="70" y1="3" x2="76" y2="3" stroke="#8898b0" stroke-width="0.8"/>

  <!-- Ground / base -->
  <rect x="28" y="190" width="110" height="10" fill="#5a6878" opacity="0.6"/>
  <rect x="0" y="195" width="160" height="5" fill="#485868" opacity="0.4"/>
</svg>
